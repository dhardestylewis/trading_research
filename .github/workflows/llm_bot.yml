name: LLM Agentic Paper Bot

on:
  schedule:
    # Run once a day at 12:00 UTC (8:00 AM Eastern)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push exactly the updated db.sqlite back to main
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./llm_paper_trader
        run: pip install -r requirements.txt

      - name: Execute LLM Autonomous Reflexion & Execution Cycle
        working-directory: ./llm_paper_trader
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MANIFOLD_API_KEY: ${{ secrets.MANIFOLD_API_KEY }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          echo "==== Phase 1: Harvesting Portfolio & Reflexion ===="
          python jobs/03_grade_pnl.py
          python jobs/04_exit_manager.py
          python jobs/05a_daily_reflection.py
          python jobs/05b_weekly_synthesis.py
          
          echo "==== Phase 2: Execution & Trade Routing ===="
          python jobs/01_scan_markets.py
          python jobs/02_price_and_trade.py

      - name: Commit Updated Shadow Ledger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add llm_paper_trader/db.sqlite
          
          # Only commit if the SQLite database file actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(llm): autonomous sync of shadow ledger [skip ci]"
          git pull origin main --strategy-option theirs
          git push
