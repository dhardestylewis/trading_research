name: Alpaca Paper Trading Canary

on:
  schedule:
    # 1h bars close on the half hour (e.g., 9:30-10:30 bar finalizes at 10:30).
    # We trigger at XX:35 to cleanly score finalized data (10:35 AM ET to 3:35 PM ET).
    - cron: '35 14-19 * * 1-5'
    # The final 3:30-4:00 PM half-bar closes at 4:00 PM ET. We trigger at 4:05 PM ET.
    - cron: '5 20 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-canary:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('scripts/canaries/canary_alpaca.py') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install pandas numpy scikit-learn torch tabpfn alpaca-trade-api websockets yfinance python-dotenv

      - name: Run Canary
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: .
        run: |
          .venv/bin/python scripts/canaries/canary_alpaca.py

      - name: Commit and push state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/canary/ data/artifacts/
          git commit -m "Update canary state and logs [skip ci]" || echo "No changes to commit"
          git push
