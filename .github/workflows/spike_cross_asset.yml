name: Cross-Asset Multivariate Evaluation Spike

on:
  push:
    paths:
      - '.github/workflows/spike_cross_asset.yml'

permissions:
  contents: write

jobs:
  evaluate-cross-asset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install tabpfn torch pandas numpy scikit-learn yfinance alpaca-trade-api python-dotenv

      - name: Execute Live CPU Exogenous Probe
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python scripts/spikes/alpaca_probe.py
