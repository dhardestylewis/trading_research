name: Cross-Asset Multivariate Evaluation Spike

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate-cross-asset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tabpfn torch pandas numpy scikit-learn yfinance python-dotenv

      - name: Execute Live CPU Exogenous Probe
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/spikes/spike_cross_asset_fast.py
