experiment_id: crypto_1h_exp006
inherits_from: crypto_1h_exp005

data_config: configs/data/crypto_1h.yaml
feature_config: configs/features/baseline_features_v1.yaml
label_config: configs/labels/horizon_labels_v1.yaml

models:
  - name: lightgbm
    config: configs/models/lightgbm_v1.yaml

backtest_config: configs/backtests/long_flat_v1.yaml

validation:
  scheme: rolling_walk_forward
  train_days: 180
  val_days: 30
  test_days: 30
  step_days: 30
  embargo_bars: 4

# ── exp006: Paper-Trade Validation Study ─────────────────────────
#
# This is NOT a new model experiment.
# It is an execution-validation study that bridges exp005 simulated
# results to live paper-trade order lifecycle evaluation.
#
# Single policy (inherited from exp005):
#   pooled-train SOL-deploy + sep_3bar_t0.55 + NOT_rebound

target_asset: SOL-USD
target_model: lightgbm

# ── Policy specification ─────────────────────────────────────────
policy:
  training_mode: pooled_train_sol_deploy
  threshold: 0.55
  sep_gap: 3
  regime_gate: NOT_rebound
  cost_bps: 15.0

# ── Deployment lanes ─────────────────────────────────────────────
primary_lane:
  name: marketable_near_open
  type: market
  description: "Primary decision lane — simplest operational path"

shadow_lanes:
  - name: passive_open_minus_5bps
    type: passive_limit
    offset_bps: 5.0
    description: "Shadow comparator — passive limit at open - 5 bps"
  - name: passive_open_minus_10bps
    type: passive_limit
    offset_bps: 10.0
    description: "Shadow comparator — passive limit at open - 10 bps"

# ── Per-signal log schema ────────────────────────────────────────
# Every signal must produce a row with these fields.
# Until live data exists, simulate_from_backtest() synthesizes them.
signal_log_fields:
  - signal_timestamp
  - gate_state
  - order_submission_timestamp
  - quoted_bid
  - quoted_ask
  - quoted_midpoint
  - submitted_order_price
  - acknowledgement_time
  - fill_time
  - fill_price
  - cancel_status          # filled | cancelled | partial_fill
  - midprice_after_1m
  - midprice_after_5m
  - midprice_after_15m
  - midprice_after_1h
  - realized_shortfall_vs_simulated
  - realized_pnl_at_horizon

# ── Evaluation metrics ───────────────────────────────────────────
evaluation_metrics:
  - realized_fill_rate
  - realized_slippage_vs_simulated
  - signed_adverse_selection_after_fill
  - cancel_rate
  - missed_trade_opportunity_cost
  - realized_return_per_filled_trade

# ── Go / No-Go Gates (paper → live capital) ──────────────────────
go_no_go:
  # These gates judge execution fidelity, not model quality.
  # The model gates were already passed in exp005.
  min_realized_fill_rate: 0.60
  max_mean_slippage_bps: 10.0
  max_adverse_selection_bps: 15.0
  max_cancel_rate: 0.30
  min_return_per_trade_bps: 5.0

# ── Metric dictionary ───────────────────────────────────────────
# Disambiguates operational quantities for the report header.
metric_dictionary:
  fill_rate: >
    Fraction of submitted orders that receive a fill (full or partial).
    Denominator = orders actually submitted to the exchange after all
    gating and spacing filters.  Not the fraction of raw signals.
  trade_count: >
    Number of distinct round-trip trades (entry + exit) that completed
    during the evaluation window.  Partial fills that were cancelled
    before exit are NOT counted.
  fold_profitability: >
    Fraction of walk-forward folds in which the mean per-trade net
    return (after costs) is strictly positive.

# ── Predictions source ───────────────────────────────────────────
exp005_predictions: data/artifacts/predictions/exp005_sol_gated_predictions.parquet

reporting:
  output_dir: reports/exp006
  make_plots: true
  save_predictions: true
