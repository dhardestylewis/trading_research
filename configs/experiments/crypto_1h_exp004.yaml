experiment_id: crypto_1h_exp004
inherits_from: crypto_1h_exp003

data_config: configs/data/crypto_1h.yaml
feature_config: configs/features/baseline_features_v1.yaml
label_config: configs/labels/horizon_labels_v1.yaml

models:
  - name: lightgbm
    config: configs/models/lightgbm_v1.yaml

backtest_config: configs/backtests/long_flat_v1.yaml

validation:
  scheme: rolling_walk_forward
  train_days: 180
  val_days: 30
  test_days: 30
  step_days: 30
  embargo_bars: 4

# ── exp004-specific: execution-design focus ──────────────────────

target_asset: SOL-USD
target_model: lightgbm

# ── Branch A: Reconciliation ─────────────────────────────────────
reconciliation:
  threshold: 0.55
  delay: 0
  cost_bps: 15.0

# ── Branch B: Intrabar fill approximation ────────────────────────
intrabar_fill:
  thresholds: [0.55]
  cost_bps: 15.0
  limit_bps_levels: [5.0, 10.0]

# ── Branch C: Passive entry feasibility ──────────────────────────
passive_entry:
  limit_offsets_bps: [0.0, 5.0, 10.0]
  threshold: 0.55
  cost_bps: 15.0

# ── Branch D: Signal-age decay curve ─────────────────────────────
signal_decay:
  deltas: [0.0, 0.25, 0.5, 1.0, 2.0]
  threshold: 0.55
  cost_bps: 15.0

# ── Branch E: Pooled vs SOL-only ─────────────────────────────────
pooled_vs_solo:
  threshold: 0.55
  sep_gap: 3
  cost_bps: 15.0

# ── Branch F: Regime-gated sparse policy ─────────────────────────
regime_gated:
  threshold: 0.55
  sep_gap: 3
  cost_bps: 15.0
  fill_types:
    - close_to_next_open
    - next_bar_midpoint
    - next_bar_vwap

# ── Predictions source ───────────────────────────────────────────
exp001_predictions: data/artifacts/predictions/crypto_1h_exp001_predictions.parquet

reporting:
  output_dir: reports/exp004
  make_plots: true
  save_predictions: true
