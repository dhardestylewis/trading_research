label_set_name: multi_horizon_labels_v1

# Extended horizons for multi-horizon stacking (Branch A)
horizons: [1, 2, 4, 8]

targets:
  regression:
    - fwd_ret_{h}h
  classification:
    - fwd_sign_{h}h
  tradable:
    - fwd_ret_after_cost_{h}h
    - fwd_profitable_{h}h

# Cost used when computing fwd_ret_after_cost and fwd_profitable labels
label_cost_regime: base  # references backtests/long_flat_v1.yaml cost regimes

output_dir: data/processed/labels_multi_horizon
